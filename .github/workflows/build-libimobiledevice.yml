name: Build libimobiledevice Static Libraries

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # =========================================================================
  # macOS arm64
  # =========================================================================
  macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Install build tools
        run: brew install autoconf automake libtool pkg-config

      - name: Clone repos
        run: |
          mkdir -p src staging
          git clone --depth 1 https://github.com/libimobiledevice/libplist src/libplist
          git clone --depth 1 https://github.com/libimobiledevice/libimobiledevice-glue src/libimobiledevice-glue
          git clone --depth 1 https://github.com/libimobiledevice/libusbmuxd src/libusbmuxd
          git clone --depth 1 https://github.com/libimobiledevice/libtatsu src/libtatsu
          git clone --depth 1 https://github.com/libimobiledevice/libirecovery src/libirecovery
          git clone --depth 1 https://github.com/libimobiledevice/libimobiledevice src/libimobiledevice
          git clone --depth 1 https://github.com/libimobiledevice/libideviceactivation src/libideviceactivation

      - name: Build OpenSSL (static)
        run: |
          curl -sLO https://www.openssl.org/source/openssl-3.4.0.tar.gz
          tar xzf openssl-3.4.0.tar.gz
          cd openssl-3.4.0
          ./Configure darwin64-arm64-cc no-shared no-tests \
            --prefix=$(pwd)/../staging --openssldir=$(pwd)/../staging/ssl
          make -j$(sysctl -n hw.logicalcpu) build_libs 2>&1 | tail -5
          make install_sw 2>&1 | tail -3 || true
          # Ensure libs are copied
          cp libssl.a libcrypto.a ../staging/lib/ 2>/dev/null || true
          cp -R include/openssl ../staging/include/ 2>/dev/null || true

      - name: Build libplist
        working-directory: src/libplist
        run: |
          STAGING="$(pwd)/../../staging"
          ./autogen.sh 2>&1 | tail -3 || true
          ./configure --prefix="$STAGING" --enable-static --disable-shared \
            CFLAGS="-arch arm64 -mmacosx-version-min=10.14 -I$STAGING/include" \
            LDFLAGS="-arch arm64 -mmacosx-version-min=10.14 -L$STAGING/lib"
          make -j$(sysctl -n hw.logicalcpu)
          make install

      - name: Build libimobiledevice-glue
        working-directory: src/libimobiledevice-glue
        run: |
          STAGING="$(pwd)/../../staging"
          ./autogen.sh 2>&1 | tail -3 || true
          PKG_CONFIG_PATH="$STAGING/lib/pkgconfig" \
          ./configure --prefix="$STAGING" --enable-static --disable-shared \
            CFLAGS="-arch arm64 -mmacosx-version-min=10.14 -I$STAGING/include" \
            LDFLAGS="-arch arm64 -mmacosx-version-min=10.14 -L$STAGING/lib"
          make -j$(sysctl -n hw.logicalcpu); make install

      - name: Build libusbmuxd
        working-directory: src/libusbmuxd
        run: |
          STAGING="$(pwd)/../../staging"
          ./autogen.sh 2>&1 | tail -3 || true
          PKG_CONFIG_PATH="$STAGING/lib/pkgconfig" \
          ./configure --prefix="$STAGING" --enable-static --disable-shared \
            CFLAGS="-arch arm64 -mmacosx-version-min=10.14 -I$STAGING/include" \
            LDFLAGS="-arch arm64 -mmacosx-version-min=10.14 -L$STAGING/lib"
          make -j$(sysctl -n hw.logicalcpu); make install

      - name: Build libtatsu
        working-directory: src/libtatsu
        run: |
          STAGING="$(pwd)/../../staging"
          ./autogen.sh 2>&1 | tail -3 || true
          PKG_CONFIG_PATH="$STAGING/lib/pkgconfig" \
          ./configure --prefix="$STAGING" --enable-static --disable-shared \
            CFLAGS="-arch arm64 -mmacosx-version-min=10.14 -I$STAGING/include" \
            LDFLAGS="-arch arm64 -mmacosx-version-min=10.14 -L$STAGING/lib"
          make -j$(sysctl -n hw.logicalcpu); make install

      - name: Build libirecovery
        working-directory: src/libirecovery
        run: |
          STAGING="$(pwd)/../../staging"
          ./autogen.sh 2>&1 | tail -3 || true
          PKG_CONFIG_PATH="$STAGING/lib/pkgconfig" \
          ./configure --prefix="$STAGING" --enable-static --disable-shared \
            CFLAGS="-arch arm64 -mmacosx-version-min=10.14 -I$STAGING/include" \
            LDFLAGS="-arch arm64 -mmacosx-version-min=10.14 -L$STAGING/lib"
          make -j$(sysctl -n hw.logicalcpu); make install

      - name: Build libimobiledevice
        working-directory: src/libimobiledevice
        run: |
          STAGING="$(pwd)/../../staging"
          ./autogen.sh 2>&1 | tail -3 || true
          PKG_CONFIG_PATH="$STAGING/lib/pkgconfig" \
          ./configure --prefix="$STAGING" --enable-static --disable-shared --without-readline \
            CFLAGS="-arch arm64 -mmacosx-version-min=10.14 -I$STAGING/include" \
            LDFLAGS="-arch arm64 -mmacosx-version-min=10.14 -L$STAGING/lib"
          make -j$(sysctl -n hw.logicalcpu); make install

      - name: Build libideviceactivation
        working-directory: src/libideviceactivation
        run: |
          STAGING="$(pwd)/../../staging"
          ./autogen.sh 2>&1 | tail -3 || true
          PKG_CONFIG_PATH="$STAGING/lib/pkgconfig" \
          ./configure --prefix="$STAGING" --enable-static --disable-shared \
            CFLAGS="-arch arm64 -mmacosx-version-min=10.14 -I$STAGING/include" \
            LDFLAGS="-arch arm64 -mmacosx-version-min=10.14 -L$STAGING/lib"
          make -j$(sysctl -n hw.logicalcpu); make install

      - name: Package artifacts
        run: |
          mkdir -p output/include output/lib
          cp -R staging/include/* output/include/
          cp staging/lib/*.a output/lib/
          cd output && zip -r ../macos-arm64.zip . && cd ..
          echo "macOS arm64: $(ls output/lib/*.a | wc -l) libraries"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: macos-arm64.zip

  # =========================================================================
  # macOS x86_64
  # =========================================================================
  macos-x86_64:
    runs-on: macos-13
    steps:
      - name: Install build tools
        run: brew install autoconf automake libtool pkg-config

      - name: Clone repos
        run: |
          mkdir -p src staging
          git clone --depth 1 https://github.com/libimobiledevice/libplist src/libplist
          git clone --depth 1 https://github.com/libimobiledevice/libimobiledevice-glue src/libimobiledevice-glue
          git clone --depth 1 https://github.com/libimobiledevice/libusbmuxd src/libusbmuxd
          git clone --depth 1 https://github.com/libimobiledevice/libtatsu src/libtatsu
          git clone --depth 1 https://github.com/libimobiledevice/libirecovery src/libirecovery
          git clone --depth 1 https://github.com/libimobiledevice/libimobiledevice src/libimobiledevice
          git clone --depth 1 https://github.com/libimobiledevice/libideviceactivation src/libideviceactivation

      - name: Build OpenSSL (static)
        run: |
          curl -sLO https://www.openssl.org/source/openssl-3.4.0.tar.gz
          tar xzf openssl-3.4.0.tar.gz
          cd openssl-3.4.0
          ./Configure darwin64-x86_64-cc no-shared no-tests \
            -mmacosx-version-min=10.14 \
            --prefix=$(pwd)/../staging --openssldir=$(pwd)/../staging/ssl
          make -j$(sysctl -n hw.logicalcpu) build_libs 2>&1 | tail -5
          make install_sw 2>&1 | tail -3 || true
          cp libssl.a libcrypto.a ../staging/lib/ 2>/dev/null || true
          cp -R include/openssl ../staging/include/ 2>/dev/null || true

      - name: Build all libraries
        run: |
          STAGING="$(pwd)/staging"
          CFLAGS="-arch x86_64 -mmacosx-version-min=10.14 -I$STAGING/include"
          LDFLAGS="-arch x86_64 -mmacosx-version-min=10.14 -L$STAGING/lib"
          PKGCONF="$STAGING/lib/pkgconfig"

          for lib in libplist libimobiledevice-glue libusbmuxd libtatsu libirecovery libimobiledevice libideviceactivation; do
            echo "=== Building $lib ==="
            cd src/$lib
            ./autogen.sh 2>&1 | tail -3 || true
            if [ "$lib" = "libimobiledevice" ]; then
              PKG_CONFIG_PATH="$PKGCONF" ./configure --prefix="$STAGING" --enable-static --disable-shared --without-readline CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
            else
              PKG_CONFIG_PATH="$PKGCONF" ./configure --prefix="$STAGING" --enable-static --disable-shared CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
            fi
            make -j$(sysctl -n hw.logicalcpu); make install
            cd ../..
          done

      - name: Package artifacts
        run: |
          mkdir -p output/include output/lib
          cp -R staging/include/* output/include/
          cp staging/lib/*.a output/lib/
          cd output && zip -r ../macos-x86_64.zip . && cd ..
          echo "macOS x86_64: $(ls output/lib/*.a | wc -l) libraries"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: macos-x86_64.zip

  # =========================================================================
  # Linux x86_64
  # =========================================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config \
            libcurl4-openssl-dev libxml2-dev libusb-1.0-0-dev

      - name: Clone repos
        run: |
          mkdir -p src staging
          git clone --depth 1 https://github.com/libimobiledevice/libplist src/libplist
          git clone --depth 1 https://github.com/libimobiledevice/libimobiledevice-glue src/libimobiledevice-glue
          git clone --depth 1 https://github.com/libimobiledevice/libusbmuxd src/libusbmuxd
          git clone --depth 1 https://github.com/libimobiledevice/libtatsu src/libtatsu
          git clone --depth 1 https://github.com/libimobiledevice/libirecovery src/libirecovery
          git clone --depth 1 https://github.com/libimobiledevice/libimobiledevice src/libimobiledevice
          git clone --depth 1 https://github.com/libimobiledevice/libideviceactivation src/libideviceactivation

      - name: Build OpenSSL (static)
        run: |
          curl -sLO https://www.openssl.org/source/openssl-3.4.0.tar.gz
          tar xzf openssl-3.4.0.tar.gz
          cd openssl-3.4.0
          ./Configure linux-x86_64 no-shared no-tests \
            --prefix=$(pwd)/../staging --openssldir=$(pwd)/../staging/ssl
          make -j$(nproc) build_libs
          make install_sw 2>&1 | tail -3 || true
          cp libssl.a libcrypto.a ../staging/lib/ 2>/dev/null || true
          cp -R include/openssl ../staging/include/ 2>/dev/null || true

      - name: Build all libraries
        run: |
          STAGING="$(pwd)/staging"
          CFLAGS="-I$STAGING/include"
          LDFLAGS="-L$STAGING/lib"
          PKGCONF="$STAGING/lib/pkgconfig"
          JOBS=$(nproc)

          for lib in libplist libimobiledevice-glue libusbmuxd libtatsu libirecovery libimobiledevice libideviceactivation; do
            echo "=== Building $lib ==="
            cd src/$lib
            ./autogen.sh 2>&1 | tail -3 || true
            if [ "$lib" = "libimobiledevice" ]; then
              PKG_CONFIG_PATH="$PKGCONF" ./configure --prefix="$STAGING" --enable-static --disable-shared --without-readline CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
            else
              PKG_CONFIG_PATH="$PKGCONF" ./configure --prefix="$STAGING" --enable-static --disable-shared CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
            fi
            make -j$JOBS; make install
            cd ../..
          done

      - name: Package artifacts
        run: |
          mkdir -p output/include output/lib
          cp -R staging/include/* output/include/
          cp staging/lib/*.a output/lib/
          cd output && zip -r ../linux-x86_64.zip . && cd ..
          echo "Linux x86_64: $(ls output/lib/*.a | wc -l) libraries"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: linux-x86_64.zip

  # =========================================================================
  # Linux aarch64 (ARM64)
  # =========================================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config \
            libcurl4-openssl-dev libxml2-dev libusb-1.0-0-dev

      - name: Clone repos
        run: |
          mkdir -p src staging
          git clone --depth 1 https://github.com/libimobiledevice/libplist src/libplist
          git clone --depth 1 https://github.com/libimobiledevice/libimobiledevice-glue src/libimobiledevice-glue
          git clone --depth 1 https://github.com/libimobiledevice/libusbmuxd src/libusbmuxd
          git clone --depth 1 https://github.com/libimobiledevice/libtatsu src/libtatsu
          git clone --depth 1 https://github.com/libimobiledevice/libirecovery src/libirecovery
          git clone --depth 1 https://github.com/libimobiledevice/libimobiledevice src/libimobiledevice
          git clone --depth 1 https://github.com/libimobiledevice/libideviceactivation src/libideviceactivation

      - name: Build OpenSSL (static)
        run: |
          curl -sLO https://www.openssl.org/source/openssl-3.4.0.tar.gz
          tar xzf openssl-3.4.0.tar.gz
          cd openssl-3.4.0
          ./Configure linux-aarch64 no-shared no-tests \
            --prefix=$(pwd)/../staging --openssldir=$(pwd)/../staging/ssl
          make -j$(nproc) build_libs
          make install_sw 2>&1 | tail -3 || true
          cp libssl.a libcrypto.a ../staging/lib/ 2>/dev/null || true
          cp -R include/openssl ../staging/include/ 2>/dev/null || true

      - name: Build all libraries
        run: |
          STAGING="$(pwd)/staging"
          CFLAGS="-I$STAGING/include"
          LDFLAGS="-L$STAGING/lib"
          PKGCONF="$STAGING/lib/pkgconfig"
          JOBS=$(nproc)

          for lib in libplist libimobiledevice-glue libusbmuxd libtatsu libirecovery libimobiledevice libideviceactivation; do
            echo "=== Building $lib ==="
            cd src/$lib
            ./autogen.sh 2>&1 | tail -3 || true
            if [ "$lib" = "libimobiledevice" ]; then
              PKG_CONFIG_PATH="$PKGCONF" ./configure --prefix="$STAGING" --enable-static --disable-shared --without-readline CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
            else
              PKG_CONFIG_PATH="$PKGCONF" ./configure --prefix="$STAGING" --enable-static --disable-shared CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
            fi
            make -j$JOBS; make install
            cd ../..
          done

      - name: Package artifacts
        run: |
          mkdir -p output/include output/lib
          cp -R staging/include/* output/include/
          cp staging/lib/*.a output/lib/
          cd output && zip -r ../linux-aarch64.zip . && cd ..
          echo "Linux aarch64: $(ls output/lib/*.a | wc -l) libraries"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: linux-aarch64.zip

  # =========================================================================
  # Windows x86_64 (MinGW static)
  # =========================================================================
  windows-x86_64:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-libusb
            git
            make
            tar

      - name: Clone repos
        run: |
          mkdir -p src staging
          git clone --depth 1 https://github.com/libimobiledevice/libplist src/libplist
          git clone --depth 1 https://github.com/libimobiledevice/libimobiledevice-glue src/libimobiledevice-glue
          git clone --depth 1 https://github.com/libimobiledevice/libusbmuxd src/libusbmuxd
          git clone --depth 1 https://github.com/libimobiledevice/libtatsu src/libtatsu
          git clone --depth 1 https://github.com/libimobiledevice/libirecovery src/libirecovery
          git clone --depth 1 https://github.com/libimobiledevice/libimobiledevice src/libimobiledevice
          git clone --depth 1 https://github.com/libimobiledevice/libideviceactivation src/libideviceactivation

      - name: Build OpenSSL (static)
        run: |
          curl -sLO https://www.openssl.org/source/openssl-3.4.0.tar.gz
          tar xzf openssl-3.4.0.tar.gz
          cd openssl-3.4.0
          ./Configure mingw64 no-shared no-tests no-asm \
            --prefix=$(pwd)/../staging --openssldir=$(pwd)/../staging/ssl
          make -j$(nproc) build_libs
          make install_sw 2>&1 | tail -3 || true
          cp libssl.a libcrypto.a ../staging/lib/ 2>/dev/null || true
          cp -R include/openssl ../staging/include/ 2>/dev/null || true

      - name: Build all libraries
        run: |
          STAGING="$(pwd)/staging"
          CFLAGS="-I$STAGING/include"
          LDFLAGS="-L$STAGING/lib"
          PKGCONF="$STAGING/lib/pkgconfig"
          JOBS=$(nproc)

          for lib in libplist libimobiledevice-glue libusbmuxd libtatsu libirecovery libimobiledevice libideviceactivation; do
            echo "=== Building $lib ==="
            cd src/$lib
            ./autogen.sh 2>&1 | tail -3 || true
            if [ "$lib" = "libimobiledevice" ]; then
              PKG_CONFIG_PATH="$PKGCONF" ./configure --prefix="$STAGING" --enable-static --disable-shared --without-readline CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
            else
              PKG_CONFIG_PATH="$PKGCONF" ./configure --prefix="$STAGING" --enable-static --disable-shared CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
            fi
            make -j$JOBS; make install
            cd ../..
          done

      - name: Package artifacts
        run: |
          mkdir -p output/include output/lib
          cp -R staging/include/* output/include/
          cp staging/lib/*.a output/lib/
          cd output && zip -r ../windows-x86_64.zip . && cd ..
          echo "Windows x86_64: $(ls output/lib/*.a | wc -l) libraries"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: windows-x86_64.zip

  # =========================================================================
  # Combine all artifacts into a single release
  # =========================================================================
  release:
    needs: [macos-arm64, macos-x86_64, linux-x86_64, linux-aarch64, windows-x86_64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create macOS universal
        run: |
          mkdir -p macos-universal/include macos-universal/lib
          unzip -o macos-arm64/macos-arm64.zip -d arm64/
          unzip -o macos-x86_64/macos-x86_64.zip -d x86_64/
          cp -R arm64/include/* macos-universal/include/
          for lib in arm64/lib/*.a; do
            name=$(basename "$lib")
            lipo -create "arm64/lib/$name" "x86_64/lib/$name" -output "macos-universal/lib/$name" 2>/dev/null || \
            cp "arm64/lib/$name" "macos-universal/lib/$name"
          done
          cd macos-universal && zip -r ../macos-universal.zip . && cd ..
          echo "macOS universal: $(ls macos-universal/lib/*.a | wc -l) libraries"

      - name: Create release archive
        run: |
          mkdir -p libimobiledevice-libs
          unzip -o linux-x86_64/linux-x86_64.zip -d libimobiledevice-libs/linux-x86_64/
          unzip -o linux-aarch64/linux-aarch64.zip -d libimobiledevice-libs/linux-aarch64/
          unzip -o macos-universal/macos-universal.zip -d libimobiledevice-libs/macos-universal/
          unzip -o windows-x86_64/windows-x86_64.zip -d libimobiledevice-libs/windows-x86_64/
          cat > libimobiledevice-libs/README.md << 'EOF'
      # libimobiledevice Static Libraries

      Prebuilt static libraries (.a) and headers for all platforms.

      ## Directory layout

      Each platform directory contains:
      - `include/` — C/C++ headers
      - `lib/` — static libraries (.a)

      ## Platforms

      - `macos-universal/` — macOS arm64 + x86_64 fat binaries
      - `linux-x86_64/` — Linux x86_64 (glibc)
      - `linux-aarch64/` — Linux ARM64 (glibc)
      - `windows-x86_64/` — Windows x86_64 (MinGW)

      ## Usage (Flutter)

      See FLUTTER_INTEGRATION.md for Flutter FFI integration guide.
      EOF
          tar czf libimobiledevice-libs.tar.gz libimobiledevice-libs/

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: libimobiledevice-all-platforms
          path: libimobiledevice-libs.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: libimobiledevice-libs.tar.gz
          name: libimobiledevice-libs ${{ github.ref_name }}
          body: |
            Static libraries for all platforms.
            - macOS universal (arm64 + x86_64)
            - Linux x86_64 + aarch64
            - Windows x86_64
          draft: true
